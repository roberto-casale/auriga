name: Deploy AURIGA su GitHub Pages

# Compila il gioco in WebAssembly con pygbag e lo pubblica su GitHub Pages
# a ogni push su main (o manualmente da Actions → Run workflow).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# un solo deploy alla volta; non annullare quello in corso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa pygbag
        run: pip install pygbag

      - name: Compila il pacchetto web
        run: python -m pygbag --build main.py

      - name: Prepara l'artifact per Pages
        run: |
          mkdir -p _site
          cp -r build/web/. _site/
          # GitHub Pages salta le cartelle che iniziano con "_": disattiva Jekyll
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
